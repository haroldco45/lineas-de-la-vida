<!DOCTYPE html>
<html lang="es">
<head>

    <main class="escenario">

            <span class="label">Para criticar</span>
            <div class="door-frame"></div>

        <div class="puerta roja" onclick="registrar('Chismear')">

            <div class="door-frame"></div>
        </div>
        <div class="puerta azul-oscuro" onclick="registrar('Involucrarse')">
            <span class="label">Para involucrarse</span>
            <div class="door-frame"></div>
        </div>
        <div class="puerta azul-claro" onclick="registrar('Alentar')">
            <span class="label">Para alentar</span>
            <div class="door-frame"></div>
        </div>
        <div class="puerta azul-brillante" onclick="registrar('Ayudar')">
            <span class="label">Para ayudar</span>
            <div class="door-frame"></div>
        </div>
    </main>

    <section id="registro-seccion">
        <h3>Tu Actividad de Hoy</h3>
        <ul id="lista-acciones">
            </ul>
